<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
color:white;
}

.container{
z-index:2;
}

h1{
font-size:3rem;
animation:fadeIn 2s ease;
}

.message{
margin-top:15px;
font-size:1.2rem;
opacity:0;
transition:0.5s;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4b5c;
font-weight:bold;
cursor:pointer;
font-size:1rem;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.cake{
font-size:80px;
margin-top:20px;
}

.balloons{
position:absolute;
bottom:-150px;
width:100%;
display:flex;
justify-content:space-around;
}

.balloon{
width:50px;
height:70px;
background:red;
border-radius:50%;
animation:float 10s infinite;
}

.balloon:nth-child(2){background:blue;animation-duration:8s;}
.balloon:nth-child(3){background:yellow;animation-duration:12s;}
.balloon:nth-child(4){background:green;animation-duration:9s;}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">

<h1>🎉 Happy Birthday 🎉</h1>

<div class="cake" id="cake">🎂</div>

<button onclick="showMessage()">Tiup Lilin</button>

<p class="message" id="message">
Semoga panjang umur, sehat selalu, dan semua impianmu tercapai! 🎈✨
</p>

<button onclick="playMusic()">Putar Musik 🎵</button>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</div>

<div class="balloons">
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
</div>

<script>

function showMessage(){
document.getElementById("message").style.opacity="1";
document.getElementById("cake").textContent="🍰";
}

function playMusic(){
document.getElementById("music").play();
}

// confetti animation
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

for(let i=0;i<150;i++){
confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+2,
d:Math.random()*150
})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

confetti.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
})

update();
}

function update(){
confetti.forEach(c=>{
c.y+=1;
if(c.y>canvas.height){
c.y=0;
}
})
}

setInterval(draw,20);

</script>

</body>
</html>
